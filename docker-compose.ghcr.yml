# Run the pre-built image published by GitHub Actions (no building needed).
services:
  pugzilla:
    image: ghcr.io/ven0x-s/pugzilla:latest
    container_name: pugzilla
    restart: unless-stopped
    pull_policy: always
    ports:
      - "9088:3001"
    volumes:
      - ./data/trades:/app/server/data
      - ./data/uploads:/app/server/uploads
    environment:
      - PORT=3001
