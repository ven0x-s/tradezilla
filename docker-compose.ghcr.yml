# Run the pre-built image published by GitHub Actions (no building on the NAS).
# Replace OWNER with your GitHub username (lowercase), e.g. ghcr.io/rickstijnman/tradezilla:latest
services:
  tradezilla:
    image: ghcr.io/OWNER/tradezilla:latest
    container_name: tradezilla
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8088:3001"
    volumes:
      - ./data/trades:/app/server/data
      - ./data/uploads:/app/server/uploads
    environment:
      - PORT=3001
